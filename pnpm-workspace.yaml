packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  core-js: true
  esbuild: true
  sharp: true
  workerd: true
# First-party packages we publish ourselves — exempt from the minimum-release-age
# supply-chain cooldown (the cooldown guards against compromised third-party
# publishes; it doesn't apply to our own code, and otherwise blocks deploying a
# just-published contrail for ~24h). Scope glob so we don't re-add per version.
minimumReleaseAgeExclude:
  - '@atmo-dev/*'
